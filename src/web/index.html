<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codegraph-mcp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; font-size: 13px; }

  #header { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 14px; color: #58a6ff; font-weight: 600; }
  #search { flex: 1; max-width: 500px; padding: 6px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 13px; font-family: inherit; }
  #search:focus { outline: none; border-color: #58a6ff; }

  #main { display: grid; grid-template-columns: 1fr 1.2fr 1fr; height: calc(100vh - 40px); }
  .panel { overflow-y: auto; padding: 12px; border-right: 1px solid #21262d; }
  .panel:last-child { border-right: none; }
  .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 8px; font-weight: 600; }

  .edge-group { margin-bottom: 12px; }
  .edge-type-label { font-size: 11px; color: #f0883e; font-weight: 600; margin-bottom: 4px; padding: 2px 6px; background: #f0883e15; border-radius: 3px; display: inline-block; }
  .edge-list { list-style: none; }
  .edge-item { padding: 4px 8px; cursor: pointer; border-radius: 4px; display: flex; flex-direction: column; gap: 1px; }
  .edge-item:hover { background: #1f2937; }
  .edge-item-name { color: #c9d1d9; font-weight: 500; }
  .edge-item-qn { color: #8b949e; font-size: 11px; word-break: break-all; }
  .edge-class-group { margin: 4px 0; }
  .edge-class-label { font-size: 12px; font-weight: 600; color: #58a6ff; padding: 3px 8px; cursor: pointer; }
  .edge-class-label:hover { text-decoration: underline; }
  .edge-class-group .edge-list { padding-left: 16px; }
  .edge-class-group .edge-item { padding: 2px 8px; }

  #center { padding: 16px; }
  .symbol-name { font-size: 18px; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
  .symbol-qn { color: #8b949e; font-size: 12px; margin-bottom: 12px; word-break: break-all; }
  .symbol-meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin-bottom: 16px; font-size: 12px; }
  .meta-key { color: #8b949e; }
  .meta-val { color: #c9d1d9; }

  .section { margin-top: 16px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 6px; font-weight: 600; border-bottom: 1px solid #21262d; padding-bottom: 4px; }
  .nav-link { padding: 3px 0; cursor: pointer; color: #58a6ff; }
  .nav-link:hover { text-decoration: underline; }
  .rel-meta { color: #8b949e; font-size: 11px; }

  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .tag-class { background: #1f6feb30; color: #58a6ff; }
  .tag-method { background: #23863530; color: #3fb950; }
  .tag-route { background: #f0883e20; color: #f0883e; }
  .tag-function { background: #bc8cff20; color: #bc8cff; }
  .tag-interface { background: #f7844020; color: #f78440; }
  .tag-trait { background: #da367020; color: #da3670; }
  .tag-file { background: #48505820; color: #8b949e; }
  .tag-default { background: #30363d; color: #8b949e; }

  #search-results { position: absolute; top: 36px; left: 0; right: 0; background: #161b22; border: 1px solid #30363d; border-radius: 6px; max-height: 400px; overflow-y: auto; z-index: 10; display: none; }
  #search-wrapper { position: relative; flex: 1; max-width: 500px; }
  .search-item { padding: 6px 10px; cursor: pointer; display: flex; gap: 8px; align-items: center; }
  .search-item:hover { background: #1f2937; }

  .empty { color: #484f58; font-style: italic; padding: 8px; }
  .loading { color: #484f58; padding: 8px; }
</style>
</head>
<body>
  <div id="header">
    <h1>codegraph</h1>
    <div id="search-wrapper">
      <input id="search" placeholder="Search symbols..." autocomplete="off">
      <div id="search-results"></div>
    </div>
  </div>
  <div id="main">
    <div class="panel" id="left"><div class="panel-title">Inbound</div><div id="inbound-content"></div></div>
    <div class="panel" id="center"><div class="empty">Search for a symbol to begin</div></div>
    <div class="panel" id="right"><div class="panel-title">Outbound</div><div id="outbound-content"></div></div>
  </div>

<script>
let debounceTimer = null;

const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

function typeTag(type) {
  const cls = { Class: 'class', Method: 'method', Route: 'route', Function: 'function', Interface: 'interface', Trait: 'trait', File: 'file', Property: 'property', Enum: 'class' }[type] || 'default';
  return `<span class="tag tag-${cls}">${esc(type)}</span>`;
}

function shortName(qn) {
  if (!qn) return '';
  const parts = qn.split('\\');
  return parts[parts.length - 1];
}

async function api(path, params = {}) {
  const url = new URL(path, location.origin);
  for (const [k, v] of Object.entries(params)) { if (v != null) url.searchParams.set(k, v); }
  const res = await fetch(url);
  return res.json();
}

// Event delegation for all navigable clicks
document.addEventListener('click', e => {
  const nav = e.target.closest('[data-nav]');
  if (nav) { navigate(nav.dataset.nav); return; }
  if (!$('search-wrapper').contains(e.target)) $('search-results').style.display = 'none';
});

$('search').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => doSearch(e.target.value), 200);
});

$('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') { $('search-results').style.display = 'none'; $('search').blur(); }
});

$('search').addEventListener('focus', () => {
  if ($('search').value.length > 1) doSearch($('search').value);
});

async function doSearch(query) {
  if (query.length < 2) { $('search-results').style.display = 'none'; return; }
  const data = await api('/api/search', { name: query, limit: 20 });
  const results = data.results || [];
  const el = $('search-results');
  el.innerHTML = results.map(r =>
    `<div class="search-item" data-nav="${esc(r.qualified_name)}">${typeTag(r.type)} <span>${esc(shortName(r.qualified_name))}</span> <span style="color:#484f58;font-size:11px">${esc(r.qualified_name)}</span></div>`
  ).join('');
  el.style.display = results.length ? 'block' : 'none';
}

function navigate(qn) {
  $('search-results').style.display = 'none';
  $('search').value = '';
  window.history.pushState({ qn }, '', `#${encodeURIComponent(qn)}`);
  loadSymbol(qn);
}

window.addEventListener('popstate', e => {
  if (e.state?.qn) { loadSymbol(e.state.qn); renderBreadcrumbs(); }
});

window.addEventListener('load', () => {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) loadSymbol(hash);
});

async function loadSymbol(qn) {
  $('center').innerHTML = '<div class="loading">Loading...</div>';
  $('inbound-content').innerHTML = '<div class="loading">Loading...</div>';
  $('outbound-content').innerHTML = '<div class="loading">Loading...</div>';

  let data;
  try { data = await api('/api/symbol', { qn }); }
  catch { $('center').innerHTML = '<div class="empty">Error loading symbol</div>'; return; }

  if (!data?.node) { $('center').innerHTML = '<div class="empty">Symbol not found</div>'; return; }

  const { node, edges } = data;
  const centerOnly = new Set(['HAS_METHOD', 'HAS_PROPERTY', 'DEFINES', 'CONTAINS_FILE', 'HAS_RELATIONSHIP', 'MAPS_TO_TABLE', 'TRIGGERS_OBSERVER', 'EXTENDS', 'IMPLEMENTS', 'USES_TRAIT']);
  const inbound = edges.filter(e => e.target_qn === qn && e.source_qn !== qn && !centerOnly.has(e.type));
  const outbound = edges.filter(e => e.source_qn === qn && e.target_qn !== qn && !centerOnly.has(e.type));

  renderCenter(node, edges);
  renderEdges($('inbound-content'), inbound, 'source');
  renderEdges($('outbound-content'), outbound, 'target');
}

function renderCenter(node, edges) {
  const meta = node.metadata || {};
  const el = document.createElement('div');

  let h = `<div class="symbol-name">${typeTag(node.type)} ${esc(node.name)}</div>`;
  h += `<div class="symbol-qn">${esc(node.qualified_name)}</div>`;
  h += `<div class="symbol-meta">`;
  h += `<span class="meta-key">File</span><span class="meta-val">${esc(node.file_path?.split('/').slice(-3).join('/') || '(inferred)')}</span>`;
  h += `<span class="meta-key">Lines</span><span class="meta-val">${node.start_line || '?'}–${node.end_line || '?'}</span>`;
  if (meta.visibility) h += `<span class="meta-key">Visibility</span><span class="meta-val">${esc(meta.visibility)}</span>`;
  if (meta.static) h += `<span class="meta-key">Static</span><span class="meta-val">yes</span>`;
  if (meta.params?.length) h += `<span class="meta-key">Params</span><span class="meta-val">${esc(meta.params.map(p => `${p.type || ''} $${p.name}`).join(', '))}</span>`;
  if (meta.inferred) h += `<span class="meta-key">Inferred</span><span class="meta-val">yes</span>`;
  if (meta.http_method) h += `<span class="meta-key">HTTP</span><span class="meta-val">${esc(meta.http_method)} ${esc(meta.path || '')}</span>`;
  h += `</div>`;

  const extendsEdges = edges.filter(e => e.type === 'EXTENDS' && e.source_qn === node.qualified_name);
  const implementsEdges = edges.filter(e => e.type === 'IMPLEMENTS' && e.source_qn === node.qualified_name);
  const traitsEdges = edges.filter(e => e.type === 'USES_TRAIT' && e.source_qn === node.qualified_name);
  const extendedBy = edges.filter(e => e.type === 'EXTENDS' && e.target_qn === node.qualified_name);
  const implementedBy = edges.filter(e => e.type === 'IMPLEMENTS' && e.target_qn === node.qualified_name);

  if (extendsEdges.length || implementsEdges.length || traitsEdges.length || extendedBy.length || implementedBy.length) {
    h += `<div class="section"><div class="section-title">Hierarchy</div>`;
    for (const e of extendsEdges) h += `<div class="nav-link" data-nav="${esc(e.target_qn)}">extends ${esc(e.target_name)}</div>`;
    for (const e of implementsEdges) h += `<div class="nav-link" data-nav="${esc(e.target_qn)}">implements ${esc(e.target_name)}</div>`;
    for (const e of traitsEdges) h += `<div class="nav-link" data-nav="${esc(e.target_qn)}">uses ${esc(e.target_name)}</div>`;
    for (const e of extendedBy) h += `<div class="nav-link" data-nav="${esc(e.source_qn)}">← extended by ${esc(e.source_name)}</div>`;
    for (const e of implementedBy) h += `<div class="nav-link" data-nav="${esc(e.source_qn)}">← implemented by ${esc(e.source_name)}</div>`;
    h += `</div>`;
  }

  const methods = edges.filter(e => e.type === 'HAS_METHOD' && e.source_qn === node.qualified_name);
  if (methods.length) {
    h += `<div class="section"><div class="section-title">Methods (${methods.length})</div>`;
    for (const m of methods) {
      h += `<div class="nav-link" data-nav="${esc(m.target_qn)}">${esc(m.target_name)}</div>`;
    }
    h += `</div>`;
  }

  const properties = edges.filter(e => e.type === 'HAS_PROPERTY' && e.source_qn === node.qualified_name);
  if (properties.length) {
    h += `<div class="section"><div class="section-title">Properties (${properties.length})</div>`;
    for (const p of properties) {
      h += `<div class="nav-link" data-nav="${esc(p.target_qn)}">${esc(p.target_name)}</div>`;
    }
    h += `</div>`;
  }

  const relationships = edges.filter(e => e.type === 'HAS_RELATIONSHIP' && e.source_qn === node.qualified_name);
  if (relationships.length) {
    h += `<div class="section"><div class="section-title">Relationships (${relationships.length})</div>`;
    for (const r of relationships) {
      const m = r.metadata ? JSON.parse(r.metadata) : {};
      h += `<div class="nav-link" data-nav="${esc(r.target_qn)}">${esc(m.method || '')} → ${esc(r.target_name)} <span class="rel-meta">(${esc(m.relationship || '')})</span></div>`;
    }
    h += `</div>`;
  }

  const tables = edges.filter(e => e.type === 'MAPS_TO_TABLE' && e.source_qn === node.qualified_name);
  if (tables.length) {
    h += `<div class="section"><div class="section-title">Database Table</div>`;
    for (const t of tables) {
      const m = t.metadata ? JSON.parse(t.metadata) : {};
      h += `<div style="color:#3fb950;font-weight:500">${esc(m.table || '')}</div>`;
    }
    h += `</div>`;
  }

  const triggers = edges.filter(e => e.type === 'TRIGGERS_OBSERVER' && e.source_qn === node.qualified_name);
  if (triggers.length) {
    h += `<div class="section"><div class="section-title">Observer Triggers (${triggers.length})</div>`;
    for (const t of triggers) {
      const m = t.metadata ? JSON.parse(t.metadata) : {};
      h += `<div class="nav-link" data-nav="${esc(t.target_qn)}">${esc(m.event || '')} → ${esc(shortName(t.target_qn))} <span class="rel-meta">(${esc(m.observer ? shortName(m.observer) : '')})</span></div>`;
    }
    h += `</div>`;
  }

  $('center').innerHTML = h;
}

function classOf(qn) {
  if (qn.includes('::')) return qn.split('::')[0];
  return qn;
}

function renderEdges(container, edges, side) {
  const byType = {};
  for (const e of edges) {
    if (!byType[e.type]) byType[e.type] = [];
    const qn = side === 'source' ? e.source_qn : e.target_qn;
    const name = side === 'source' ? e.source_name : e.target_name;
    const nodeType = side === 'source' ? e.source_type : e.target_type;
    if (!byType[e.type].find(x => x.qn === qn)) {
      byType[e.type].push({ qn, name, nodeType, cls: classOf(qn) });
    }
  }

  const sorted = Object.keys(byType).sort();
  if (sorted.length === 0) { container.innerHTML = '<div class="empty">None</div>'; return; }

  let h = '';
  for (const type of sorted) {
    const items = byType[type];
    h += `<div class="edge-group"><div class="edge-type-label">${esc(type)} (${items.length})</div>`;

    const byClass = {};
    for (const item of items) {
      if (!byClass[item.cls]) byClass[item.cls] = [];
      byClass[item.cls].push(item);
    }

    const classes = Object.keys(byClass).sort();
    for (const cls of classes) {
      const members = byClass[cls];
      if (members.length === 1 && members[0].qn === cls) {
        h += `<div class="edge-item" data-nav="${esc(cls)}"><span class="edge-item-name">${typeTag(members[0].nodeType)} ${esc(shortName(cls))}</span></div>`;
      } else {
        h += `<div class="edge-class-group"><div class="edge-class-label" data-nav="${esc(cls)}">${esc(shortName(cls))}</div><ul class="edge-list">`;
        for (const item of members.slice(0, 30)) {
          h += `<li class="edge-item" data-nav="${esc(item.qn)}"><span class="edge-item-name">${esc(item.name)}</span></li>`;
        }
        if (members.length > 30) h += `<li class="edge-item"><span class="edge-item-qn">... and ${members.length - 30} more</span></li>`;
        h += `</ul></div>`;
      }
    }
    h += `</div>`;
  }
  container.innerHTML = h;
}
</script>
</body>
</html>
